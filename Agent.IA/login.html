<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center min-vh-100 custom-bg">

    <div class="container">
        <div class="row justify-content-center">
            
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card custom-card shadow-lg h-100">
                    <div class="card-body p-5">

                        
                        <div id="login-content" class="form-content">
                            <h1 class="text-center text-primary fw-bold mb-4 brand-title">Agent.IA</h1>
                            <h2 class="text-center mb-4 text-secondary fs-4">Entrar</h2>
                            <form id="form-login">
                                <div class="mb-3">
                                    <label for="email-login" class="form-label">E-mail</label>
                                    <input type="email" id="email-login" class="form-control form-control-lg" required>
                                </div>
                                <div class="mb-4">
                                    <label for="senha-login" class="form-label">Senha</label>
                                    <div class="input-group">
                                        <input type="password" id="senha-login" class="form-control form-control-lg" required>
                                        <button class="btn btn-outline-secondary toggle-senha" type="button">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary btn-lg w-100 btn-hover">Entrar</button>
                            </form>
                            <div class="text-center mt-4">
                                <p class="text-muted mb-0">Não tem uma conta?</p>
                                <button id="btn-ir-para-cadastro" class="btn btn-link text-decoration-none fw-bold">Cadastre-se</button>
                            </div>
                        </div>

                       
                        <div id="cadastro-content" class="form-content hidden">
                            <h1 class="text-center text-primary fw-bold mb-4 brand-title">Agent.IA</h1>
                            <h2 class="text-center mb-4 text-secondary fs-4">Criar Conta</h2>
                            <form id="form-cadastro">
                                <div class="mb-3">
                                    <label for="nome" class="form-label">Nome</label>
                                    <input type="text" id="nome" class="form-control form-control-lg" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email-cadastro" class="form-label">E-mail</label>
                                    <input type="email" id="email-cadastro" class="form-control form-control-lg" required>
                                </div>
                                <div class="mb-3">
                                    <label for="senha-cadastro" class="form-label">Senha</label>
                                    <div class="input-group">
                                        <input type="password" id="senha-cadastro" class="form-control form-control-lg" required>
                                        <button class="btn btn-outline-secondary toggle-senha" type="button">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="confirmar-senha-cadastro" class="form-label">Confirmar Senha</label>
                                    <div class="input-group">
                                        <input type="password" id="confirmar-senha-cadastro" class="form-control form-control-lg" required>
                                        <button class="btn btn-outline-secondary toggle-senha" type="button">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                
                                
                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" id="termos-lgpd" required>
                                    <label class="form-check-label text-muted small" for="termos-lgpd">
                                        Li e concordo com os <a href="#" class="text-decoration-none">Termos de Uso</a> e <a href="#" class="text-decoration-none">Política de Privacidade</a>.
                                    </label>
                                </div>

                                <button type="submit" class="btn btn-outline-primary btn-lg w-100 btn-hover">Cadastrar</button>
                            </form>
                            <div class="text-center mt-4">
                                <p class="text-muted mb-0">Já tem uma conta?</p>
                                <button id="btn-ir-para-login" class="btn btn-link text-decoration-none fw-bold">Faça Login</button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
    <button id="theme-toggle" class="btn btn-dark theme-toggle-btn" title="Alternar Modo Noturno">
        <i id="theme-icon" class="bi bi-moon-fill"></i>
    </button>

    <script src="theme.js"></script>
</body>
</html>
