<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent.IA - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light custom-bg min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold brand-title" href="#">Agent.IA</a>
            
            <div class="d-flex align-items-center" id="area-autenticacao">
            </div>

        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row g-4">
            
            <div class="col-12 col-lg-7">
                <div class="card custom-card shadow-sm h-100">
                    <div class="card-header bg-white border-0 pt-4 pb-2">
                        <h5 class="fw-bold text-primary mb-0"><i class="bi bi-robot me-2"></i>Assistente Virtual</h5>
                    </div>
                    <div class="card-body d-flex flex-column">
                        
                        <div id="chat-window" class="chat-window flex-grow-1 mb-3 p-3 rounded bg-light border overflow-auto" style="height: 400px;">
                            <div class="chat-message ia-message mb-3">
                                <div class="bg-primary text-white p-3 rounded-3 shadow-sm d-inline-block">
                                    Olá! Eu sou o Agent.IA. Qual é o seu próximo compromisso? Pode me dizer o horário e o local, e eu calculo a rota e marco em sua agenda.
                                </div>
                            </div>
                        </div>

                        <form id="form-chat" class="d-flex gap-2">
                            <input type="text" id="input-chat" class="form-control form-control-lg" placeholder="Digite seu compromisso..." autocomplete="off">
                            <button type="submit" class="btn btn-primary btn-lg px-4 btn-hover"><i class="bi bi-send-fill"></i></button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-5">
                <div class="card custom-card shadow-sm h-100">
                    <div class="card-header bg-white border-0 pt-4 pb-2 d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold text-secondary mb-0"><i class="bi bi-calendar2-week me-2"></i>Agenda de Hoje</h5>
                        <button class="btn btn-outline-primary btn-sm btn-hover" data-bs-toggle="modal" data-bs-target="#modalManual">
                            <i class="bi bi-plus-lg me-1"></i>Manual
                        </button>
                    </div>
                    <div class="card-body">
                        
                        <div class="list-group list-group-flush" id="lista-compromissos">
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="modalManual" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content custom-card">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-primary">Novo Compromisso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="form-manual">
                        <div class="mb-3">
                            <label class="form-label">Título</label>
                            <input type="text" id="titulo-compromisso" class="form-control" placeholder="Ex: Reunião com Cliente" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Data</label>
                                <input type="date" id="data-compromisso" class="form-control" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Hora</label>
                                <input type="time" id="hora-compromisso" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Endereço Completo</label>
                            <input type="text" id="endereco-compromisso" class="form-control" placeholder="Busque a rua e adicione o número..." required autocomplete="off">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg btn-hover" disabled>Salvar Compromisso</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalDetalhes" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content custom-card">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-primary" id="detalhe-titulo-abas">Detalhes do Compromisso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-12 col-md-5">
                            <div class="mb-3">
                                <h4 class="fw-bold mb-1" id="detalhe-titulo">Título</h4>
                                <p class="text-primary fw-bold mb-3" id="detalhe-data-hora"><i class="bi bi-clock me-2"></i>Horário</p>
                            </div>
                            <div class="p-3 rounded border mb-4 caixa-destaque">
                                <p class="mb-1 text-secondary small fw-bold text-uppercase">Local de Destino</p>
                                <p class="mb-0 small" id="detalhe-endereco">Endereço</p>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="button" id="btn-detalhe-editar" class="btn btn-outline-secondary w-50 btn-hover"><i class="bi bi-pencil me-2"></i>Editar</button>
                                <button type="button" id="btn-detalhe-excluir" class="btn btn-outline-danger w-50 btn-hover"><i class="bi bi-trash me-2"></i>Excluir</button>
                            </div>
                        </div>
                        <div class="col-12 col-md-7">
                            <div id="mapa-rota" class="rounded border w-100" style="height: 320px; z-index: 1;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content custom-card">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-primary">Editar Compromisso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="form-editar">
                        <div class="mb-3">
                            <label class="form-label">Título</label>
                            <input type="text" id="editar-titulo" class="form-control" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Data</label>
                                <input type="date" id="editar-data" class="form-control" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Hora</label>
                                <input type="time" id="editar-hora" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Endereço Completo</label>
                            <input type="text" id="editar-endereco" class="form-control" required autocomplete="off">
                        </div>
                        <button type="submit" id="btn-editar-salvar" class="btn btn-primary w-100 btn-lg btn-hover">Atualizar Dados</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dashboard.js"></script>
    <button id="theme-toggle" class="btn btn-dark theme-toggle-btn" title="Alternar Modo Noturno">
        <i id="theme-icon" class="bi bi-moon-fill"></i>
    </button>

    <script src="theme.js"></script>
</body>
</html>
